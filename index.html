        .btn {

            padding: 12px 32px;
            border-radius: 40px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            background: var(--primary-green);

        }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.05); }
        section { padding: 80px 5%; }
        .section-title {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 3rem;
            color: var(--primary-green);
        }
        .section-title::after {
            content: '';

            width: 80px;
            height: 3px;
            background: var(--primary-green);

        .card, .feature-card, .category-card, .product-card, .review-card, .blog-card, .case-card, .cert-card {
            background: var(--card-bg);
            border: 1px solid var(--border-light);

        .compare-panel {

        footer { background: #f0f4f0; text-align: center; padding: 2rem; border-top: 1px solid var(--border-light); }
        .live-chat-widget { position: fixed; bottom: 25px; right: 25px; z-index: 1100; }

        .faq-item { background: var(--card-bg); border-radius: 20px; margin-bottom: 1rem; }
        .faq-question { padding: 1.2rem; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; }
        .faq-answer { padding: 0 1.2rem 1.2rem; display: none; }
        .faq-item.active .faq-answer { display: block; }
        input, select, textarea { width: 100%; padding: 12px 16px; border-radius: 24px; border: 1px solid var(--border-light); }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { font-weight: 600; color: var(--primary-green); display: block; margin-bottom: 0.5rem; }
        #scrollTop { position: fixed; bottom: 30px; right: 100px; background: var(--primary-green); width: 48px; height: 48px; border-radius: 50%; display: none; cursor: pointer; color: white; border: none; z-index: 999; }
        .map-placeholder { background: #e8f5e9; border-radius: 24px; padding: 2rem; text-align: center; margin-top: 1rem; }
    </style>
</head>

<script>
(function() {
    // --- DATA ---
    const products = [
        { id:"LED-0W", name:"0W LED Bulb", category:"General Purpose", watt:0, lumens:"N/A", life:"10k hrs", colorTemp:"Warm", icon:"💡", bestSeller:false },
        { id:"LED-5W", name:"5W LED Bulb", category:"General Purpose", watt:5, lumens:"450 lm", life:"25k hrs", colorTemp:"3000K-6500K", icon:"💡", bestSeller:true },
        { id:"LED-7W", name:"7W LED Bulb", category:"General Purpose", watt:7, lumens:"700 lm", life:"25k hrs", colorTemp:"Daylight", icon:"💡", bestSeller:true },
        { id:"LED-9W", name:"9W LED Bulb", category:"General Purpose", watt:9, lumens:"900 lm", life:"30k hrs", colorTemp:"Cool White", icon:"💡", bestSeller:true },
        { id:"LED-12W", name:"12W LED Bulb", category:"General Purpose", watt:12, lumens:"1200 lm", life:"30k hrs", colorTemp:"Tri-colour", icon:"💡" },
        { id:"LED-18W", name:"18W LED Bulb", category:"General Purpose", watt:18, lumens:"1800 lm", life:"30k hrs", colorTemp:"Cool White", icon:"💡" },
        { id:"LED-30W", name:"30W LED Bulb", category:"General Purpose", watt:30, lumens:"3000 lm", life:"35k hrs", colorTemp:"Daylight", icon:"💡" },
        { id:"LED-40W", name:"40W LED Bulb", category:"General Purpose", watt:40, lumens:"4000 lm", life:"35k hrs", colorTemp:"White", icon:"💡" },
        { id:"LED-50W", name:"50W LED Bulb", category:"General Purpose", watt:50, lumens:"5000 lm", life:"40k hrs", colorTemp:"Cool White", icon:"💡" },
        { id:"LED-60W", name:"60W LED Bulb", category:"General Purpose", watt:60, lumens:"6000 lm", life:"40k hrs", colorTemp:"Daylight", icon:"💡" },
        { id:"UFO-60W", name:"60W UFO Light", category:"Specialty Lighting", watt:60, lumens:"7200 lm", life:"50k hrs", colorTemp:"5000K", icon:"🛸", bestSeller:true },
        { id:"SMD-7W", name:"7W SMD Module", category:"SMD Modules", watt:7, lumens:"630 lm", life:"30k hrs", colorTemp:"White", icon:"🔲" },
        { id:"SMD-12W", name:"12W SMD Module", category:"SMD Modules", watt:12, lumens:"1080 lm", life:"30k hrs", colorTemp:"White", icon:"🔲" },
        { id:"SMD-7C", name:"7 Color SMD Module", category:"SMD Modules", watt:7, lumens:"RGB", life:"25k hrs", colorTemp:"Multi", icon:"🌈", bestSeller:true },
        { id:"MOON-12W", name:"12W Moon Light", category:"Moonlights", watt:12, lumens:"900 lm", life:"20k hrs", colorTemp:"Warm/Cool", icon:"🌙" },
        { id:"MOON-18W", name:"18W Moon Light", category:"Moonlights", watt:18, lumens:"1500 lm", life:"20k hrs", colorTemp:"Adjustable", icon:"🌙" },
        { id:"MOON-3in1", name:"3 in 1 Moon Light", category:"Moonlights", watt:15, lumens:"1200 lm", life:"25k hrs", colorTemp:"3 modes", icon:"🌕", bestSeller:true }
    ];
    const categories = [
        { name:"General Purpose", icon:"💡", desc:"0W to 60W domestic & commercial bulbs" },
        { name:"Specialty Lighting", icon:"🛸", desc:"UFO high bay lights" },
        { name:"SMD Modules", icon:"🔲", desc:"High-density SMD strips & modules" },
        { name:"Moonlights", icon:"🌙", desc:"Decorative mood lighting" }
    ];
    const certifications = [{ name:"ISO 9001", icon:"🏅" },{ name:"CE Certified", icon:"✅" },{ name:"RoHS Compliant", icon:"♻️" }];
    const caseStudies = [{ title:"Hotel Chain Retrofit", desc:"Replaced 5000 bulbs, saved 60% energy", icon:"🏨" },{ title:"Factory Lighting", desc:"Installed 200 UFO lights, improved visibility", icon:"🏭" }];
    const videoTestimonials = [{ title:"Client Review - Karachi Wholesaler", embed:"<div class='video-placeholder' style='background:#e0e0e0;padding:2rem;border-radius:20px;'>🎥 Video testimonial placeholder</div>" }];
    // --- global state ---
    let currentCategory = "all";
    let minWatt = 0, maxWatt = 100;
    let sortBy = "name";
    let searchTerm = "";
    let compareList = [];
    let productsPerPage = 12;
    let currentPage = 1;
    let isLoading = false;

    function renderProducts(append=false) {
        let filtered = products.filter(p => (currentCategory==="all" || p.category===currentCategory) &&
            p.watt >= minWatt && p.watt <= maxWatt &&
            (p.name.toLowerCase().includes(searchTerm) || p.watt.toString().includes(searchTerm)));
        if(sortBy === "name") filtered.sort((a,b)=>a.name.localeCompare(b.name));
        else if(sortBy === "watt") filtered.sort((a,b)=>a.watt-b.watt);
        const total = filtered.length;
        const start = 0; const end = productsPerPage * currentPage;
        const toShow = filtered.slice(0, end);
        const container = document.getElementById("prodGrid");
        if(!append) container.innerHTML = "";
        toShow.forEach(p => {
            const card = document.createElement("div");
            card.className = "product-card";
            card.innerHTML = `
                <div class="product-icon">${p.icon}</div>
                <span class="product-category">${p.category}</span>
                <h3>${p.name}</h3>
                <div>${p.watt}W | ${p.lumens}</div>
                <div>${p.colorTemp} | ${p.life}</div>
                <div style="margin-top:1rem; display:flex; gap:8px; justify-content:center;">
                    <button class="btn quick-view" data-id="${p.id}" style="padding:6px 12px;">Quick View</button>
                    <button class="btn compare-add" data-id="${p.id}" style="padding:6px 12px; background:var(--light-green);">Compare</button>
                    <button class="btn quote-product" data-name="${p.name}" style="padding:6px 12px;">Quote</button>
                </div>
            `;
            container.appendChild(card);
        });
        document.getElementById("loadMoreBtn").style.display = (end < total) ? "block" : "none";
        document.getElementById("resultCount").innerText = `${toShow.length} of ${total} products`;
        if(!append) attachProductEvents();
    }

    function attachProductEvents() {
        document.querySelectorAll(".quick-view").forEach(btn => btn.addEventListener("click", (e) => {
            const id = btn.getAttribute("data-id");
            const prod = products.find(p=>p.id===id);
            document.getElementById("quickViewContent").innerHTML = `<h3>${prod.name}</h3><p>Watt: ${prod.watt}W</p><p>Lumens: ${prod.lumens}</p><p>Life: ${prod.life}</p><p>Color Temp: ${prod.colorTemp}</p><button class="btn quote-product" data-name="${prod.name}">Request Quote</button>`;
            document.getElementById("quickViewModal").style.display = "flex";
        }));
        document.querySelectorAll(".compare-add").forEach(btn => btn.addEventListener("click", (e) => {
            const id = btn.getAttribute("data-id");
            if(!compareList.includes(id) && compareList.length<2) compareList.push(id);
            updateComparePanel();
        }));
        document.querySelectorAll(".quote-product").forEach(btn => btn.addEventListener("click", () => document.getElementById("quoteModal").style.display = "flex"));
    }
    function updateComparePanel() {
        const panel = document.getElementById("comparePanel");
        document.getElementById("compareCount").innerText = compareList.length;
        if(compareList.length) panel.style.display = "flex";
        else panel.style.display = "none";
    }
    document.getElementById("clearCompare")?.addEventListener("click",()=>{ compareList=[]; updateComparePanel(); });

    const observer = new IntersectionObserver((entries) => {
        if(entries[0].isIntersecting && !isLoading && document.getElementById("loadMoreBtn").style.display !== "none") {
            isLoading = true;
            currentPage++;
            renderProducts(true);
            isLoading = false;
        }
    }, { threshold: 0.5 });
    function observeLoadMore() { const el = document.getElementById("loadMoreBtn"); if(el) observer.observe(el); }

    function buildFullPage() {
        return `
        <section id="features"><div class="grid-3">
            <div class="feature-card"><i class="fas fa-industry" style="font-size:2.5rem;color:var(--primary-green);"></i><h3>Factory Direct</h3><p>Wholesale rates from Asia LED.</p></div>
            <div class="feature-card"><i class="fas fa-chart-line" style="font-size:2.5rem;color:var(--primary-green);"></i><h3>High Efficiency</h3><p>160 lm/W, premium lifespan.</p></div>
            <div class="feature-card"><i class="fas fa-truck-fast" style="font-size:2.5rem;color:var(--primary-green);"></i><h3>Fast Shipping</h3><p>Pan-Pakistan logistics.</p></div>
        </div></section>
        <section id="products"><div class="section-title">Our LED Collection</div>
        <div class="categories-grid" id="catGrid"></div>
        <div class="breadcrumb" id="breadcrumb">Home / All Products</div>
        <div class="filters-bar"><div class="filter-group"><select id="sortSelect"><option value="name">Sort by Name</option><option value="watt">Sort by Wattage</option></select><input type="number" id="minWatt" placeholder="Min Watt" value="0"><input type="number" id="maxWatt" placeholder="Max Watt" value="100"><input type="text" id="searchProd" placeholder="Search..."></div><div class="result-count" id="resultCount"></div></div>
        <div class="active-filter" id="activeFilter" style="display:none;"><div class="filter-tag">Category: <span id="currentCatName"></span> <button id="clearFilterBtn">✕</button></div></div>
        <div class="products-grid" id="prodGrid"></div>
        <div style="text-align:center; margin-top:30px;"><button id="loadMoreBtn" class="btn">Load More</button></div>
        </section>
        <section id="wholesale"><div class="section-title">Wholesale / B2B</div><div class="wholesale-banner" style="background: linear-gradient(135deg,#e8f5e9,white); border-radius:40px; padding:2rem; text-align:center; margin-bottom:2rem;"><h3>⚡ Factory Rates for Bulk Orders</h3><p>Partner with Asia LED – owned by M Noor Ramzan.</p><button id="openQuoteFromBanner" class="btn btn-gold">Request Quote</button></div>
        <div><h3>Direct Inquiry Form</h3><form id="wholesaleDirectForm"><div class="form-group"><label>Company *</label><input name="company" required></div><div class="form-group"><label>Contact Person *</label><input name="person" required></div><div class="form-group"><label>Email</label><input name="email"></div><div class="form-group"><label>Phone *</label><input name="phone" required></div><div class="form-group"><label>Requirements</label><textarea name="requirements"></textarea></div><button type="submit" class="btn">Submit</button></form></div></section>
        <section id="about"><div class="section-title">About Asia LED</div><div class="about-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:2rem;"><div style="background:var(--card-bg); border-radius:32px; padding:2rem;"><i class="fas fa-user-tie" style="font-size:4rem;color:var(--primary-green);"></i><h3>M Noor Ramzan</h3><p>CEO & Founder</p><p>"Quality and transparency define Asia LED."</p></div><div><h3>Manufacturing Excellence</h3><p>Capacity 2M units/month, ISO 9001 certified, serving global markets. Located at Chowk Nag Shah, Old Shujabad Road, Multan.</p></div></div></section>
        <section id="certifications"><div class="section-title">Certifications</div><div class="cert-grid">${certifications.map(c=>`<div class="cert-card"><div style="font-size:3rem;">${c.icon}</div><h3>${c.name}</h3></div>`).join('')}</div></section>

    function initWebsite() {
        document.getElementById("deferred-content").innerHTML = buildFullPage();

            document.getElementById("breadcrumb").innerHTML = `Home / ${currentCategory}`;

        }));

        observeLoadMore();
        // reviews, blog, faq
        document.getElementById("reviewsGrid").innerHTML = `<div class="review-card"><div>👨 Usman (Karachi)</div><div>⭐⭐⭐⭐⭐</div><p>"Factory direct rates are unbeatable."</p></div><div class="review-card"><div>👩 Fatima (Lahore)</div><div>⭐⭐⭐⭐⭐</div><p>"Great wholesale partner."</p></div>`;

        const chatContainer = document.querySelector(".chat-container");
